# docker-compose.yml
# ─────────────────────────────────────────────────────────────
# Spins up PostgreSQL and Redis for local development.
# Run: docker-compose up -d
# ─────────────────────────────────────────────────────────────

version: '3.8'

services:

  # PostgreSQL — long-term storage
  # Stores: users, conversations, messages, traces
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentosdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis — short-term session cache
  # Stores: session state, recent message history, rate limits
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
